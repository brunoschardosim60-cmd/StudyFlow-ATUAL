<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: transparent;
  overflow: hidden;
  height: 100%;
}

.pip-root {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(10, 15, 25, 0.92);
  backdrop-filter: blur(12px);
  border-radius: 999px;
  padding: 8px 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  font-family: Inter, system-ui, -apple-system, sans-serif;
  height: 100%;
  transition: opacity 0.4s ease;
  border: 1px solid rgba(255,255,255,0.06);
  user-select: none;
}

.pip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #475569;
  flex-shrink: 0;
  position: relative;
}

.pip-dot.active {
  background: #3b82f6;
}

.pip-dot-glow {
  display: none;
  position: absolute;
  top: -3px; left: -3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(59,130,246,0.25);
  animation: pulse-glow 2s ease-in-out infinite;
}

.pip-dot.active .pip-dot-glow {
  display: block;
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

.pip-time {
  font-size: 18px;
  font-weight: 600;
  color: white;
  letter-spacing: 1px;
  transition: opacity 0.2s ease;
  font-variant-numeric: tabular-nums;
}

.pip-actions {
  display: flex;
  gap: 6px;
  margin-left: 4px;
}

.pip-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 12px;
  line-height: 1;
}

.pip-btn:hover {
  background: rgba(255,255,255,0.2);
}

.pip-btn-stop {
  color: #ef4444;
}

.pip-btn-stop:hover {
  background: rgba(239,68,68,0.15);
}
</style>
</head>
<body>
<div class="pip-root" id="root">
  <div class="pip-dot" id="dot"><div class="pip-dot-glow"></div></div>
  <span class="pip-time" id="time">00:00:00</span>
  <div class="pip-actions">
    <button class="pip-btn" id="btn-toggle" title="Pausar">⏸</button>
    <button class="pip-btn pip-btn-stop" id="btn-stop" title="Parar">⏹</button>
  </div>
</div>

<script>
  var running = false;
  var idleTimer = null;
  var root = document.getElementById('root');
  var dot = document.getElementById('dot');
  var timeEl = document.getElementById('time');
  var btnToggle = document.getElementById('btn-toggle');
  var btnStop = document.getElementById('btn-stop');

  function setIdle(val) {
    root.style.opacity = val ? '0.5' : '1';
  }

  function resetIdle() {
    setIdle(false);
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function() { setIdle(true); }, 3000);
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'pip-update') {
      timeEl.textContent = e.data.time || '00:00:00';
      running = !!e.data.running;
      dot.className = 'pip-dot' + (running ? ' active' : '');
      btnToggle.textContent = running ? '⏸' : '▶';
      btnToggle.title = running ? 'Pausar' : 'Continuar';
      resetIdle();
    }
    if (e.data && e.data.type === 'pip-close') {
      window.close();
    }
  });

  btnToggle.addEventListener('click', function() {
    if (window.opener) {
      window.opener.postMessage({ type: 'pip-action', action: running ? 'pause' : 'resume' }, '*');
    }
  });

  btnStop.addEventListener('click', function() {
    if (window.opener) {
      window.opener.postMessage({ type: 'pip-action', action: 'stop' }, '*');
    }
  });

  document.addEventListener('mousemove', resetIdle);
  root.addEventListener('mouseenter', function() { setIdle(false); });

  // Signal ready
  if (window.opener) {
    window.opener.postMessage({ type: 'pip-ready' }, '*');
  }
</script>
</body>
</html>
